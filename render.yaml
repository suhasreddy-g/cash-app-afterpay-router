# Render Blueprint for the FastAPI payment router.
# Docs: https://render.com/docs/blueprint-spec
#
# Lives at the repo root so Render auto-detects it. `rootDir: backend`
# makes the build/start commands run inside the backend/ directory.

services:
  - type: web
    name: cash-app-afterpay-router
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Render injects $PORT and routes traffic to it — bind to that.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      # Secrets — set these in the Render dashboard. sync: false keeps them
      # out of source control and prompts for a value on first deploy.
      - key: SQUARE_ACCESS_TOKEN
        sync: false
      - key: SQUARE_APP_ID
        sync: false
